<!--
  Supabase Auth → Confirm signup email template.
  NOT auto-applied — paste this into the Supabase dashboard:
    Authentication → Emails → Templates → "Confirm signup" → Message body.
  Styling mirrors the invite email (send-group-invite): indented 560px column,
  #1a2c3a headings/body, accent-yellow (#dea838) pill button matching
  "Join the group →". {{ .ConfirmationURL }} is Supabase's confirm link.
-->
<!DOCTYPE html>
<html>
<body style="margin:0;padding:0;background:#ffffff;font-family:system-ui,-apple-system,sans-serif">
<div style="max-width:560px;margin:0 auto;padding:56px 32px">
  <h1 style="margin:0 0 24px;font-size:22px;color:#1a2c3a;font-weight:800;line-height:1.35">
    ✅ Confirm your email to finish setting up Sidebar.
  </h1>
  <p style="margin:0 0 28px;font-size:15px;color:#1a2c3a;line-height:1.55">
    Tap the button below to confirm your email — it'll sign you in automatically.
  </p>
  <a href="{{ .ConfirmationURL }}" style="display:inline-block;background:#dea838;color:#fff;text-decoration:none;padding:12px 28px;border-radius:999px;font-size:15px;font-weight:700">
    Confirm your email →
  </a>
  <p style="margin:32px 0 0;font-size:12px;color:rgba(26,44,58,0.6);line-height:1.6">
    If you didn't create a Sidebar account, you can safely ignore this email.
  </p>
</div>
</body>
</html>
