# Supabase CLI per-function config.
# Read on every `supabase functions deploy <name>`.

[functions.send-invite]
# Project is on ES256 JWT signing keys; the Edge Functions gateway runtime
# only accepts HS256 and would 401 every call with UNSUPPORTED_TOKEN_ALGORITHM.
# The function verifies the JWT itself via admin.auth.getUser(jwt), so the
# gateway check is redundant. Pinning here so future deploys don't have to
# remember --no-verify-jwt. See HANDOFF.md §"Edge function deploy notes".
verify_jwt = false

[functions.send-message]
# Same reason as send-invite — function does its own JWT verification
# inside via admin.auth.getUser(jwt); gateway check is redundant and
# would 401 with the project's ES256 keys.
verify_jwt = false

[functions.send-digests]
# Not user-invoked — called by pg_cron (and manually for testing), not by a
# browser with a user JWT. Gateway JWT verification is disabled; the function
# instead gates on a shared secret (DIGEST_CRON_SECRET via x-digest-secret
# header). See HANDOFF.md §"Edge function deploy notes".
verify_jwt = false
