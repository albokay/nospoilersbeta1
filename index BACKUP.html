<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>No-Spoilers Mock</title>
    <style>
      html,body{margin:0;padding:0;background:#f1f1f0;color:#111;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Inter,Helvetica,Arial,sans-serif;}
      button,input,select{font-family:inherit}
      .container{max-width:1100px;margin:0 auto;padding:0 16px}
      .card{background:#fff;border:1px solid #d1d5db;border-radius:16px;padding:16px}
      .muted{color:#6b7280}
      .title{font-weight:800;letter-spacing:.02em}
      .badge{display:inline-block;border:1px solid #111;border-radius:9999px;padding:.25rem .6rem;background:#fff;font-weight:700}
      .btn{border:1px solid #111;border-radius:9999px;padding:.5rem 1rem;background:#fff;font-weight:700;cursor:pointer}
      .btn.primary{background:#ea7f3b;color:#fff}
      .stickybar{position:sticky;top:0;z-index:40;background:rgba(241,241,240,.9);backdrop-filter:saturate(180%) blur(6px);border-bottom:1px solid #d1d5db}
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
